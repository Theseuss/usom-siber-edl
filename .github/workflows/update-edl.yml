name: Your Existing Workflow

on:
  # Keeps your existing triggers active
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
  # Adds the hourly automation trigger
  schedule:
    - cron: '0 * * * *'
    
  # Allows you to trigger it manually via the GitHub UI
  workflow_dispatch:

jobs:
  # Leave all your existing jobs and steps exactly as they are
  your-existing-job:
    runs-on: ubuntu-latest
    steps:
      - name: Your steps
        run: echo "Your existing steps run here"

name: Update EDL

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch IPs
        run: python fetch_ips.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/edl.txt
          git diff --cached --quiet || git commit -m "EDL updated: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
