name: EDL Güncelle

on:
  schedule:
    - cron: '0 * * * *'   # her saat başı
  workflow_dispatch:        # elle de tetiklenebilir

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: IP listesini çek
        run: python fetch_ips.py

      - name: GitHub Pages'e commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/edl.txt
          git diff --cached --quiet || git commit -m "EDL güncellendi: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
